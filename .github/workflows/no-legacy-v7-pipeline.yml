name: Legacy v7-pipeline Guard

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'

jobs:
  guard:
    name: "Guard: no invoke('v7-pipeline')"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert legacy endpoint is not referenced
        run: npm run check:no-legacy-pipeline
